<div class="page-container">
  <div class="page-header">
    <h1>Inventory</h1>
    <div class="header-actions">
      <button mat-stroked-button [color]="lowStockOnly ? 'warn' : 'primary'"
              (click)="lowStockOnly = !lowStockOnly; page=1; load()">
        <mat-icon>warning</mat-icon>
        {{ lowStockOnly ? 'Show All' : 'Low Stock Only' }}
      </button>
    </div>
  </div>

  <mat-card class="filter-card">
    <div class="filter-row">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search items</mat-label>
        <input matInput [formControl]="searchCtrl" placeholder="Code or name">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      <span class="spacer"></span>
      <span class="total-label">{{ total }} items</span>
    </div>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="items">

        <ng-container matColumnDef="ItemCode">
          <th mat-header-cell *matHeaderCellDef>Code</th>
          <td mat-cell *matCellDef="let i"><code>{{ i.ItemCode }}</code></td>
        </ng-container>

        <ng-container matColumnDef="ItemName">
          <th mat-header-cell *matHeaderCellDef>Item Name</th>
          <td mat-cell *matCellDef="let i">{{ i.ItemName }}</td>
        </ng-container>

        <ng-container matColumnDef="Brand">
          <th mat-header-cell *matHeaderCellDef>Brand</th>
          <td mat-cell *matCellDef="let i">{{ i.Brand || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="Category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let i">{{ i.Category || '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="AvailableQty">
          <th mat-header-cell *matHeaderCellDef>Available</th>
          <td mat-cell *matCellDef="let i">{{ i.AvailableQty }}</td>
        </ng-container>

        <ng-container matColumnDef="ReservedQty">
          <th mat-header-cell *matHeaderCellDef>Reserved</th>
          <td mat-cell *matCellDef="let i" class="reserved-col">{{ i.ReservedQty }}</td>
        </ng-container>

        <ng-container matColumnDef="FreeQty">
          <th mat-header-cell *matHeaderCellDef>Free</th>
          <td mat-cell *matCellDef="let i">
            <div class="free-qty-cell">
              <strong [class.low]="i.FreeQty <= i.MinQty">{{ i.FreeQty }}</strong>
              <mat-progress-bar mode="determinate" [value]="stockPercent(i)"
                                [color]="stockPercent(i) < 20 ? 'warn' : 'primary'"
                                style="width:60px">
              </mat-progress-bar>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="Status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let i">
            <span class="stock-badge" [class]="stockStatusClass(i)">
              {{ stockStatus(i) }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="Actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let i">
            <button mat-icon-button color="primary" (click)="openAdjust(i)" matTooltip="Adjust Stock">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"
            [class.row-low]="row.FreeQty <= row.MinQty && row.FreeQty > 0"
            [class.row-out]="row.FreeQty <= 0">
        </tr>
        <tr *matNoDataRow>
          <td [attr.colspan]="columns.length" class="empty-row">No items found</td>
        </tr>
      </table>

      <mat-paginator
        [length]="total"
        [pageSize]="limit"
        [pageSizeOptions]="[20,30,50]"
        (page)="onPageChange($event)">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
