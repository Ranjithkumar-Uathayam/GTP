<h2 mat-dialog-title>Create New Order</h2>

<mat-dialog-content [formGroup]="form" class="dialog-content">
  <div class="form-row">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Order Number *</mat-label>
      <input matInput formControlName="orderNumber" placeholder="ORD-2026-001">
    </mat-form-field>
  </div>

  <div class="form-row two-col">
    <mat-form-field appearance="outline">
      <mat-label>Customer Code</mat-label>
      <input matInput formControlName="customerCode">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Customer Name</mat-label>
      <input matInput formControlName="customerName">
    </mat-form-field>
  </div>

  <div class="form-row two-col">
    <mat-form-field appearance="outline">
      <mat-label>Priority</mat-label>
      <mat-select formControlName="priority">
        <mat-option [value]="1">Normal</mat-option>
        <mat-option [value]="2">High</mat-option>
        <mat-option [value]="3">Urgent</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Notes</mat-label>
      <input matInput formControlName="notes">
    </mat-form-field>
  </div>

  <mat-divider style="margin: 12px 0"></mat-divider>
  <h3>Order Items</h3>

  <div formArrayName="items">
    <div *ngFor="let item of items.controls; let i=index"
         [formGroupName]="i" class="item-row">
      <span class="item-num">{{ i+1 }}</span>

      <mat-form-field appearance="outline" style="flex:1">
        <mat-label>Item Code</mat-label>
        <input matInput formControlName="itemCode">
      </mat-form-field>

      <mat-form-field appearance="outline" style="flex:2">
        <mat-label>Item Name</mat-label>
        <input matInput formControlName="itemName">
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:90px">
        <mat-label>Qty</mat-label>
        <input matInput type="number" formControlName="requiredQty">
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:80px">
        <mat-label>UOM</mat-label>
        <input matInput formControlName="uom">
      </mat-form-field>

      <button mat-icon-button color="warn" (click)="removeItem(i)"
              [disabled]="items.length===1">
        <mat-icon>remove_circle</mat-icon>
      </button>
    </div>
  </div>

  <button mat-stroked-button type="button" (click)="addItem()" style="margin-top:8px">
    <mat-icon>add</mat-icon> Add Item
  </button>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary"
          (click)="submit()"
          [disabled]="form.invalid || saving">
    {{ saving ? 'Creating...' : 'Create Order' }}
  </button>
</mat-dialog-actions>
